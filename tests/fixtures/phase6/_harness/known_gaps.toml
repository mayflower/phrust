[known_gaps]
PHASE6_HARNESS_EXAMPLE_GAP = "Example known-gap entry used to validate explicit test-ID based gap handling."
PHASE6-GAP-SOURCE-NUL-ESCAPE = "The parser/source string layer does not yet decode PHP double-quoted \\0 escapes; runtime string functions are binary-safe for actual NUL bytes in unit tests."
PHASE6-GAP-FPRINTF-STREAM-RESOURCE = "fprintf requires stream/resource values; the Phase 6 stream layer has not introduced those values yet."
PHASE6-GAP-ARRAY-WALK-BY-REF-MUTATION = "array_walk invokes callbacks but does not yet pass array elements by reference for callback-side mutation."
PHASE6-GAP-NATURAL-SORT-EDGE-CASES = "natsort and natcasesort implement deterministic natural ordering for common Composer-style names but not every Zend leading-zero and locale-sensitive edge case."
PHASE6-GAP-MATH-FLOAT-EDGES = "Math numeric MVP covers common integer, float, numeric-string, NaN, INF, and formatting paths, but not every PHP_ROUND_* mode, negative-zero formatting, overflow, or architecture-sensitive float edge case."
PHASE6-GAP-SYMBOL-TRAIT-INTROSPECTION = "trait_exists and get_declared_traits cannot observe user traits until trait declarations are preserved in the frontend/IR symbol tables."
PHASE6-GAP-FORWARD-STATIC-CALL-EDGE-PARITY = "forward_static_call routes ordinary static callables through the VM callable path but does not yet model every Zend late-static-binding edge or diagnostic."
PHASE6-GAP-CALL-USER-FUNC-ARRAY-BYREF = "call_user_func_array supports positional and named array arguments but does not yet promote array elements into by-reference callback slots."
