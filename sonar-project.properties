sonar.projectKey=mayflower_phrust
sonar.projectName=phrust

# Rust workspace sources and repository-level build/tooling files.
sonar.sources=crates,Cargo.toml,Cargo.lock,README.md,AGENTS.md,deny.toml,flake.nix,justfile

# Exclusions: local caches, generated artifacts, pinned external sources, and
# build output. PHPT/php-src inputs stay under third_party and must not be
# analyzed as project source.
sonar.exclusions=\
  **/target/**,\
  **/.cache/**,\
  **/.git/**,\
  **/.github/**,\
  third_party/**,\
  Volumes/**,\
  **/node_modules/**,\
  **/.venv/**,\
  **/__pycache__/**,\
  tests/**,\
  fixtures/**,\
  crates/php_std/src/generated/**,\
  docs/**/generated/**,\
  target/**

# Rust analysis. SonarQube's Rust analyzer runs Clippy by default when Cargo
# and Clippy are available on PATH.
sonar.rust.cargo.manifestPaths=Cargo.toml
sonar.rust.clippy.enabled=true
sonar.rust.lcov.reportPaths=target/sonar/lcov.info

# Coverage is meaningful for Rust crates only. Fixture corpora, docs, scripts,
# generated stdlib metadata, and CLI binaries are intentionally excluded from
# the coverage denominator.
sonar.coverage.exclusions=\
  tests/**,\
  fixtures/**,\
  scripts/**,\
  docs/**,\
  demo/**,\
  tools/**,\
  references/**,\
  crates/*/src/bin/**,\
  crates/*/examples/**,\
  crates/php_phpt_tools/src/commands/policy.rs
