name: phase7

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_long_benchmarks:
        description: "Run optional long Phase 7 benchmark suite"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "17 3 * * 1"

jobs:
  verify:
    name: Phase 7 verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Check flake metadata
        run: nix flake check

      - name: Verify Phase 7
        run: nix develop -c just verify-phase7

      - name: Upload Phase 7 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase7-reports
          if-no-files-found: ignore
          path: |
            target/phase7/**/*.json
            target/phase7/**/*.md
            target/phase7/**/*.txt

  benchmarks:
    name: Optional Phase 7 benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_long_benchmarks == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Run Phase 7 benchmark suite
        run: nix develop -c just bench-phase7

      - name: Generate Phase 7 performance report
        run: nix develop -c just perf-report

      - name: Upload Phase 7 benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase7-benchmark-reports
          if-no-files-found: ignore
          path: |
            target/phase7/**/*.json
            target/phase7/**/*.md
            target/criterion/**
