name: phase4

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Phase 4 verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Check flake metadata
        run: nix flake check || true

      - name: Verify Phase 4
        run: nix develop -c just verify-phase4
