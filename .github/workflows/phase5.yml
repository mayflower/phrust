name: phase5

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Phase 5 verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Check flake metadata
        run: nix flake check || true

      - name: Verify Phase 5
        run: nix develop -c just verify-phase5

      - name: Upload Phase 5 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5-reports
          if-no-files-found: ignore
          path: |
            target/phase5/**/*.json
            target/phase5/**/*.txt
            target/phase4/**/*.json
            target/phase4/**/*.txt
